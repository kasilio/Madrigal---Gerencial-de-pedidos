<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madrigal Agronegócios — Sistema de Pedidos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1A5E2A;--green-light:#E8F5E9;--green-mid:#A5D6A7;--green-dark:#0d3d1a;
  --amber:#BA7517;--amber-light:#FAEEDA;--red:#A32D2D;--red-light:#FCEBEB;
  --blue:#185FA5;--blue-light:#E6F1FB;--gray-light:#F1EFE8;
  --text:#1a1a1a;--text-sec:#5F5E5A;--border:#d3d1c7;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',system-ui,sans-serif;
}
body{font-family:var(--font);background:#f5f5f0;color:var(--text);min-height:100vh}
.hidden{display:none!important}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--green-dark) 0%,var(--green) 100%)}
.auth-box{background:#fff;border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.auth-logo{text-align:center;margin-bottom:1.5rem}
.auth-logo-title{font-size:1.6rem;font-weight:700;color:var(--green);letter-spacing:-.5px}
.auth-logo-sub{font-size:.8rem;color:var(--text-sec);margin-top:3px}
.auth-box h2{font-size:1rem;font-weight:600;margin-bottom:1.2rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.75rem;font-weight:600;color:var(--text-sec);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{width:100%;padding:.65rem .85rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.9rem;font-family:var(--font);background:#fff;color:var(--text);transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
textarea{resize:vertical;min-height:80px}
.btn{padding:.6rem 1.2rem;border:none;border-radius:var(--radius);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.4rem;font-family:var(--font)}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:var(--green-dark)}
.btn-secondary{background:#fff;color:var(--green);border:1px solid var(--green)}.btn-secondary:hover{background:var(--green-light)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#7a1f1f}
.btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{background:#8a5510}
.btn-sm{padding:.35rem .7rem;font-size:.78rem}
.btn-full{width:100%;justify-content:center}
.error-msg{color:var(--red);font-size:.82rem;margin-top:.4rem}
/* APP LAYOUT */
.app-wrap{display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--green);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-logo{padding:1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,.15)}
.sidebar-logo-name{font-size:1.05rem;font-weight:700;letter-spacing:-.3px}
.sidebar-logo-sub{font-size:.68rem;opacity:.65;margin-top:2px}
.sidebar-user{padding:.8rem 1rem;border-bottom:1px solid rgba(255,255,255,.15);font-size:.78rem}
.sidebar-user strong{display:block;font-size:.85rem;margin-top:2px}
.sidebar-nav{flex:1;padding:.6rem 0;overflow-y:auto}
.nav-section-label{padding:.5rem 1rem .2rem;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.45}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.58rem 1rem;cursor:pointer;font-size:.85rem;transition:background .12s;color:rgba(255,255,255,.82);border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;border-left-color:var(--green-mid)}
.nav-item .icon{width:18px;text-align:center;font-size:.95rem}
.nav-badge{background:var(--amber);color:#fff;font-size:.62rem;font-weight:700;padding:.15rem .4rem;border-radius:10px;margin-left:auto}
.sidebar-bottom{padding:.8rem 1rem;border-top:1px solid rgba(255,255,255,.15)}
.main{flex:1;margin-left:224px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:1.05rem;font-weight:600}
.content{flex:1;padding:1.5rem}
/* CARDS */
.card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.2rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:.92rem;font-weight:600;margin-bottom:1rem}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1rem}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem}
.stat-label{font-size:.7rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem}
.stat-value{font-size:1.5rem;font-weight:700;color:var(--green)}
/* PEDIDOS */
.pedidos-filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.filter-chip{padding:.28rem .75rem;border-radius:20px;font-size:.73rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text-sec);transition:all .12s;font-family:var(--font)}
.filter-chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.pedido-row{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1.1rem;margin-bottom:.45rem;display:grid;grid-template-columns:80px 1fr 120px 115px 155px 80px;gap:.8rem;align-items:center;cursor:pointer;transition:border-color .12s}
.pedido-row:hover{border-color:var(--green)}
.pedido-num{font-weight:700;color:var(--green);font-size:.88rem;font-family:'DM Mono',monospace}
.pedido-cliente{font-size:.85rem;font-weight:600}
.pedido-valor{font-size:.85rem;font-weight:700}
.pedido-data{font-size:.77rem;color:var(--text-sec)}
.status-badge{font-size:.68rem;font-weight:700;padding:.22rem .6rem;border-radius:20px;text-align:center;white-space:nowrap;letter-spacing:.2px}
.s-digitado{background:#e8f5e9;color:#1a5e2a}
.s-aguardando_aprovacao,.s-ag_aprovacao{background:var(--amber-light);color:var(--amber)}
.s-aprovado_assinatura{background:var(--blue-light);color:var(--blue)}
.s-aguardando_assinatura,.s-ag_assinatura{background:var(--blue-light);color:var(--blue)}
.s-aguardando_validacao,.s-validar_assinatura{background:var(--amber-light);color:var(--amber)}
.s-aprovado_embarque,.s-lib_embarque,.s-ag_embarque{background:#e8f5e9;color:#1a5e2a}
.s-aguardando_pagamento,.s-ag_pagamento{background:var(--amber-light);color:var(--amber)}
.s-concluido{background:#d3d1c7;color:#444}
.s-cancelado{background:#f0f0f0;color:#888}
.s-aguardando_aprovacao{background:var(--amber-light);color:var(--amber)}
.s-aguardando_assinatura{background:var(--blue-light);color:var(--blue)}
.s-validar_assinatura{background:#ede7f6;color:#5B3A8C}
.s-aguardando_validacao{background:#ede7f6;color:#5B3A8C}
.s-lib_embarque{background:#e8f5e9;color:#1a5e2a}
.s-aprovado_embarque{background:#e8f5e9;color:#1a5e2a}
.s-ag_pagamento{background:var(--amber-light);color:var(--amber)}
.s-aguardando_pagamento{background:var(--amber-light);color:var(--amber)}
.s-ag_embarque{background:var(--blue-light);color:var(--blue)}
.s-concluido{background:#d3d1c7;color:#444}
.s-reprovado{background:var(--red-light);color:var(--red)}
.s-ag_aprovacao{background:var(--amber-light);color:var(--amber)}
.s-ag_assinatura{background:var(--blue-light);color:var(--blue)}
/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.section-divider{font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-sec);padding:.5rem 0;border-bottom:1px solid var(--border);margin:1.1rem 0 .75rem}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:740px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:.98rem;font-weight:700}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end;flex-wrap:wrap;position:sticky;bottom:0;background:#fff}
.btn-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-sec);padding:.2rem .4rem;line-height:1}
/* TIMELINE */
.tl-item{display:flex;gap:.8rem;margin-bottom:.9rem;align-items:flex-start}
.tl-dot{width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:.35rem}
.tl-status{font-size:.82rem;font-weight:600}
.tl-info{font-size:.73rem;color:var(--text-sec);margin-top:.12rem}
.tl-note{font-size:.78rem;margin-top:.22rem;background:var(--gray-light);padding:.35rem .6rem;border-radius:var(--radius);border-left:3px solid var(--green)}
/* UPLOAD */
.upload-area{display:block;border:2px dashed var(--border);border-radius:var(--radius);padding:.9rem;text-align:center;cursor:pointer;transition:all .15s;font-size:.8rem;color:var(--text-sec);margin-top:.35rem;position:relative}
.upload-area:hover{border-color:var(--green);background:var(--green-light)}
.upload-area{position:relative;overflow:hidden}.upload-area{position:relative!important}.upload-area input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:10}
.file-item{display:flex;align-items:center;gap:.5rem;padding:.38rem .6rem;background:var(--green-light);border-radius:var(--radius);font-size:.78rem;margin-bottom:.28rem}
.file-item .file-name{flex:1;font-weight:600;color:var(--green)}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--green);color:#fff;padding:.45rem .75rem;text-align:left;font-weight:600;font-size:.76rem}
td{padding:.45rem .75rem;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:var(--gray-light)}
/* TOAST */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem}
.toast{padding:.65rem 1rem;border-radius:var(--radius);font-size:.83rem;font-weight:600;color:#fff;animation:slideIn .25s ease;max-width:300px;font-family:var(--font)}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
/* MISC */
.item-card{background:var(--green-light);border:1px solid var(--green-mid);border-radius:var(--radius);padding:.65rem 1rem;display:flex;align-items:center;gap:.8rem;margin-bottom:.45rem}
.item-card-name{flex:1;font-weight:600;font-size:.86rem}
.item-card-ncm{font-size:.73rem;color:var(--text-sec)}
.user-row{display:flex;align-items:center;gap:.8rem;padding:.65rem .85rem;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.45rem;background:#fff}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0}
.user-info{flex:1}
.user-name{font-weight:600;font-size:.86rem}
.user-role{font-size:.73rem;color:var(--text-sec)}
.alert{padding:.65rem 1rem;border-radius:var(--radius);font-size:.82rem;margin-bottom:.8rem}
.alert-info{background:var(--blue-light);color:var(--blue);border:1px solid #b5d4f4}
.alert-warning{background:var(--amber-light);color:var(--amber);border:1px solid #f5c478}
.alert-success{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}
.conclusao-box{background:var(--gray-light);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-top:.5rem}
.conclusao-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin-bottom:.8rem}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:.8rem}
.spinner{width:32px;height:32px;border:3px solid var(--green-light);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ===== MOBILE ===== */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:.4rem;color:#fff;flex-direction:column;gap:5px;align-items:center;justify-content:center}
.hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98}
.pedido-card-mob{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.6rem;cursor:pointer;transition:border-color .12s;display:none}
.pedido-card-mob:hover,.pedido-card-mob:active{border-color:var(--green);background:var(--green-light)}
.pcm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.pcm-num{font-weight:700;color:var(--green);font-family:'DM Mono',monospace;font-size:.92rem}
.pcm-val{font-weight:700;font-size:.9rem}
.pcm-cliente{font-size:.88rem;font-weight:600;margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcm-item{font-size:.75rem;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.4rem}
.pcm-bot{display:flex;align-items:center;justify-content:space-between;margin-top:.4rem}
.pcm-data{font-size:.72rem;color:var(--text-sec)}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--green);z-index:99;padding:.4rem 0 calc(.4rem + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.2)}
.bottom-nav-inner{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:.25rem .5rem;cursor:pointer;color:rgba(255,255,255,.65);border:none;background:none;font-family:var(--font);font-size:.58rem;font-weight:600;position:relative;min-width:52px}
.bn-item.active{color:#fff}
.bn-icon{font-size:1.25rem;line-height:1.2}
.bn-badge{position:absolute;top:0;right:.2rem;background:var(--amber);color:#fff;font-size:.52rem;font-weight:700;padding:.1rem .28rem;border-radius:8px;min-width:14px;text-align:center}
@media(max-width:768px){
  .auth-box{padding:1.5rem;margin:.75rem;border-radius:var(--radius)}
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;z-index:99}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0!important;padding-bottom:72px}
  .hamburger{display:flex}
  .topbar{padding:.6rem 1rem}
  .content{padding:.8rem}
  .stats-grid{grid-template-columns:1fr 1fr;gap:.5rem}
  .stat-value{font-size:1.15rem}
  .stat-card{padding:.7rem .8rem}
  .pedido-row{display:none!important}
  .pedido-card-mob{display:block}
  .pedidos-filters{flex-wrap:nowrap;overflow-x:auto;padding-bottom:.3rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .pedidos-filters::-webkit-scrollbar{display:none}
  .filter-chip{flex-shrink:0;white-space:nowrap}
  .form-row,.form-row-3{grid-template-columns:1fr!important}
  input,select,textarea{font-size:16px!important;padding:.7rem .85rem}
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;max-height:94vh;max-width:100%!important;width:100%}
  .modal-footer{flex-direction:column;gap:.4rem}
  .modal-footer .btn{width:100%!important;justify-content:center}
  .bottom-nav{display:block}
  .toast-wrap{bottom:80px;left:.8rem;right:.8rem}
  .toast{max-width:100%}
  .card{padding:.9rem 1rem}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:460px}
  .conclusao-box .form-row{grid-template-columns:1fr!important}
  .item-card{flex-wrap:wrap}
  .user-row{flex-wrap:wrap}
}
@media(max-width:400px){
  .auth-box{padding:1.1rem;margin:.5rem}
  .stats-grid{grid-template-columns:1fr 1fr}
}
/* FILTROS */
.filtros-bar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem;padding:.8rem 1rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg)}
.filtros-bar .fg{margin:0}
.filtros-bar label{font-size:.68rem}
.filtros-bar input,.filtros-bar select{padding:.45rem .7rem;font-size:.82rem}
/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1rem}
.ana-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem}
.ana-label{font-size:.68rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.2rem}
.ana-value{font-size:1.25rem;font-weight:700;color:var(--green);font-family:'DM Mono',monospace}
.ana-sub{font-size:.72rem;color:var(--text-sec);margin-top:.15rem}
.chart-bar-wrap{margin-bottom:1rem}
.chart-bar-item{display:flex;align-items:center;gap:.6rem;margin-bottom:.45rem;font-size:.8rem}
.chart-bar-label{width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-sec);font-size:.75rem}
.chart-bar-bg{flex:1;background:var(--gray-light);border-radius:4px;height:18px;overflow:hidden}
.chart-bar-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s ease;display:flex;align-items:center;padding-left:6px;min-width:2px}
.chart-bar-val{font-weight:600;font-size:.72rem;color:#fff;white-space:nowrap}
.chart-bar-val-out{font-size:.72rem;color:var(--text-sec);margin-left:.3rem}
@media(max-width:768px){
  .analytics-grid{grid-template-columns:1fr 1fr}
  .filtros-bar{flex-direction:column}
  .filtros-bar .fg{width:100%}
  .filtros-bar input,.filtros-bar select{width:100%}
  .chart-bar-label{width:110px}
}
@media(max-width:400px){
  .analytics-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="toast-wrap" class="toast-wrap"></div>
<div id="loading" class="loading-overlay hidden"><div class="spinner"></div><div style="font-size:.85rem;color:var(--text-sec)">Salvando...</div></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap">

        <div class="alert alert-info" style="margin-bottom:1rem">Primeiro acesso. Configure o administrador master.</div>
        <div class="form-group"><label>Nome completo</label><input id="setup-name" placeholder="Seu nome completo"></div>
        <div class="form-group"><label>CPF</label><input id="setup-cpf" placeholder="000.000.000-00"></div>

        <div class="form-group"><label>Senha</label><input id="login-pass" type="password" placeholder="Sua senha" onkeydown="if(event.key==='Enter')login()"></div>
        <div id="login-error" class="error-msg" style="display:none"></div>
        <button class="btn btn-primary btn-full" onclick="login()">Entrar</button>
      </div>

<script>
// ===== STORAGE =====
// Firebase REST
const FS_BASE='https://firestore.googleapis.com/v1/projects/madrigal---gestao-de-pedidos/databases/(default)/documents/dados/principal?key=AIzaSyAd1Ox3U0FRV__y6tCCSPHmRDGEFV3rIz4';
const FS_KEY='AIzaSyAd1Ox3U0FRV__y6tCCSPHmRDGEFV3rIz4';
const ST_BASE='https://firebasestorage.googleapis.com/v0/b/madrigal---gestao-de-pedidos.appspot.com/o';
const LOCAL_KEY='madrigal_db_v4';
let DB={};

function defaultItens(){return[
  {id:'i1',codigo:'UPE25',nome:'Ureia Pecuária (46% N) – Sacaria 25 kg',ncm:'3102.10.10',ativo:true},
  {id:'i2',codigo:'UPE1000',nome:'Ureia Pecuária (46% N) – Big Bag 1.000 kg',ncm:'3102.10.10',ativo:true},
  {id:'i3',codigo:'UGR1000',nome:'Ureia Granulada (46% N) – Big Bag 1.000 kg',ncm:'3102.10.10',ativo:true},
];}

function saveLocal(){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(DB));}catch(e){}}

// Mapa de aliases para normalizar status vindos de versões antigas ou do Firebase
const STATUS_ALIAS={
  'ag_aprovacao':'aguardando_aprovacao',
  'ag_assinatura':'aguardando_assinatura',
  'validar_assinatura':'aguardando_validacao',
  'lib_embarque':'aprovado_embarque',
  'ag_embarque':'aprovado_embarque',
  'ag_pagamento':'aguardando_pagamento',
};

function ensureDB(){
  if(!DB.users)DB.users=[];
  if(!DB.pedidos)DB.pedidos=[];
  if(!DB.clientes)DB.clientes=[];
  if(!DB.itens||!DB.itens.length)DB.itens=defaultItens();
  if(!DB.formas_pgto)DB.formas_pgto=['Antecipado','À vista no carregamento','À vista na descarga','A combinar'];
  // Corrigir numeração de pedidos históricos conhecidos
  const numFix = {
    'cl-agrozacca': '001',
    'cl-agrofarma': '002', 
    'cl-dourado':   '003',
    'cl-sanlac':    '004',
  };
  // Buscar também por nome do cliente para pedidos que não têm o ID seed
  const nomeFix = {
    'Agrozacca Alimentos LTDA':               '001',
    'AGROFARMA':                              '002',
    'COMERCIAL AGROPECUÁRIA DOURADO LTDA':    '003',
    'COMERCIAL AGROPECUARIA DOURADO LTDA':    '003',
    'SAN LAC':                                '004',
    'San Lac':                                '004',
    'SAN LAC – TECNOLOGIA':                   '004',
  };
  let numChanged = false;
  DB.pedidos.forEach(p=>{
    const fixById = numFix[p.clienteId];
    const fixByName = Object.keys(nomeFix).find(k=>p.clienteNome&&p.clienteNome.toUpperCase().includes(k.toUpperCase()));
    const novoNum = fixById || (fixByName ? nomeFix[fixByName] : null);
    if(novoNum && p.numero !== novoNum){ p.numero = novoNum; numChanged = true; }
  });
  if(numChanged) saveLocal();

  // Normalizar status de pedidos vindos de outros formatos
  const statusMap={'aguardando_validacao':'validar_assinatura','aprovado_assinatura':'aguardando_assinatura','aprovado_embarque':'lib_embarque','ag_aprovacao':'aguardando_aprovacao'};
  DB.pedidos.forEach(p=>{if(statusMap[p.status])p.status=statusMap[p.status];});
  // Normalizar aliases de status
  DB.pedidos.forEach(p=>{if(STATUS_ALIAS[p.status])p.status=STATUS_ALIAS[p.status];});
  const sc={'cl-agrozacca':'00001','cl-gtfab':'00002','cl-agrofarma':'00003','cl-dourado':'00004'};
  let m=false;
  DB.clientes.forEach(cl=>{if(!cl.codigo){if(sc[cl.id]){cl.codigo=sc[cl.id];m=true;}}});
  const mx=Math.max(0,...DB.clientes.filter(c=>c.codigo).map(c=>parseInt(c.codigo)||0));
  let nc=mx;
  DB.clientes.forEach(cl=>{if(!cl.codigo){nc++;cl.codigo=String(nc).padStart(5,'0');m=true;}});
  if(m)saveLocal();
}

async function saveDB(){
  saveLocal();
  try{
    const clone=JSON.parse(JSON.stringify(DB));
    (clone.pedidos||[]).forEach(p=>{(p.arquivos||[]).forEach(a=>{if(a.b64&&a.b64.length>100)a.b64='[arquivo]';});});
    fetch(FS_BASE,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{db:fsTo(clone),updated:{stringValue:new Date().toISOString()}}})}).catch(()=>{});
  }catch(e){}
}

function fsFrom(v){if(!v)return null;if('nullValue'in v)return null;if('booleanValue'in v)return v.booleanValue;if('integerValue'in v)return parseInt(v.integerValue);if('doubleValue'in v)return v.doubleValue;if('stringValue'in v)return v.stringValue;if('arrayValue'in v)return(v.arrayValue.values||[]).map(fsFrom);if('mapValue'in v){const o={};for(const k in(v.mapValue.fields||{}))o[k]=fsFrom(v.mapValue.fields[k]);return o;}return null;}
function fsTo(o){if(o===null||o===undefined)return{nullValue:null};if(typeof o==='boolean')return{booleanValue:o};if(typeof o==='number')return Number.isInteger(o)?{integerValue:String(o)}:{doubleValue:o};if(typeof o==='string')return{stringValue:o};if(Array.isArray(o))return{arrayValue:{values:o.map(fsTo)}};if(typeof o==='object'){const f={};for(const k in o)f[k]=fsTo(o[k]);return{mapValue:{fields:f}};}return{stringValue:String(o)};}
async function loadDB(){
  try{
    const r=await fetch(FS_BASE,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return;
    const doc=await r.json();
    if(!doc.fields)return;
    const remoto=fsFrom(doc.fields.db);
    if(!remoto)return;
    const nR=(remoto.pedidos||[]).length;
    const nL=(DB.pedidos||[]).length;
    if(nR>=nL){DB=remoto;ensureDB();saveLocal();updateBadges();}
  }catch(e){}
}

// ===== AUTH =====
let currentUser=null;
function maskCPF(v){return String(v).replace(/\D/g,'').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');}

function initApp(){
  // 1. Carrega localStorage imediatamente
  try{
    const s=localStorage.getItem(LOCAL_KEY);
    if(s)DB=JSON.parse(s);
  }catch(e){}
  ensureDB();

  // 2. Verifica sessão salva
  try{
    const s=sessionStorage.getItem('madrigal_user');
    if(s){
      const u=JSON.parse(s);
      const exists=DB.users.find(x=>x.id===u.id&&x.ativo);
      if(exists){currentUser=exists;showApp();loadDB();return;}
      sessionStorage.removeItem('madrigal_user');
    }
  }catch(e){}

  // 3. Mostra tela de autenticação
  document.getElementById('auth-screen').classList.remove('hidden');
  if(DB.users.length===0){
    document.getElementById('auth-setup').classList.remove('hidden');
  }else{
    document.getElementById('auth-login').classList.remove('hidden');
  }
  // Tenta sincronizar Supabase em background
  loadDB();
}

async function createMaster(){
  const name=document.getElementById('setup-name').value.trim();
  const cpf=document.getElementById('setup-cpf').value.replace(/\D/g,'');
  const pass=document.getElementById('setup-pass').value;
  const pass2=document.getElementById('setup-pass2').value;
  const err=document.getElementById('setup-error');
  if(!name||cpf.length<11||pass.length<6||pass!==pass2){
    err.textContent='Preencha todos os campos (CPF 11 dígitos, senhas iguais, mín. 6 caracteres).';
    err.classList.remove('hidden');return;
  }
  const master={id:uid(),nome:name,cpf,senha:btoa(pass),role:'master',ativo:true,criadoEm:now()};

  currentUser=master;
  sessionStorage.setItem('madrigal_user',JSON.stringify(master));

}

// ===================== APP =====================
function showApp(){
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('main-app').style.display='flex';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('sb-user-name').textContent=currentUser.nome;
  document.getElementById('sb-user-cpf').textContent=maskCPF(currentUser.cpf);
  document.getElementById('sb-role-badge').textContent=currentUser.role==='master'?'👑 Master':'👤 Vendedor';
  if(currentUser.role==='master'){
    document.getElementById('nav-admin-section').classList.remove('hidden');
  } else {
    // Vendedor: esconde dashboard e admin na sidebar, vai direto para pedidos
    document.getElementById('nav-dashboard').classList.add('hidden');
  }
  // Ajustar bottom nav para vendedor
  if(currentUser.role!=='master'){
    const bnDash=document.getElementById('bn-dashboard');
    const bnCl=document.getElementById('bn-clientes');
    if(bnDash)bnDash.style.display='none';
    if(bnCl)bnCl.style.display='none';
  }
  navigate(currentUser.role==='master'?'dashboard':'pedidos');
}

function navigate(page){
  // Close sidebar on mobile when navigating
  document.querySelector('.sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('open');
  // Bloquear páginas restritas para vendedor
  const paginasMaster=['dashboard','itens','usuarios','clientes'];
  if(currentUser&&currentUser.role!=='master'&&paginasMaster.includes(page)){
    toast('Acesso restrito ao administrador master.','err');
    page='pedidos';
  }
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav-'+page);if(el)el.classList.add('active');
  const titles={dashboard:'Dashboard',pedidos:'Pedidos','novo-pedido':'Novo Pedido',itens:'Produtos',usuarios:'Usuários',clientes:'Clientes'};
  document.getElementById('topbar-title').textContent=titles[page]||page;
  document.getElementById('topbar-actions').innerHTML='';
  const c=document.getElementById('main-content');
  if(page==='dashboard')renderDashboard(c);
  else if(page==='pedidos')renderPedidos(c);
  else if(page==='novo-pedido')renderNovoPedido(c);
  else if(page==='itens')renderItens(c);
  else if(page==='usuarios')renderUsuarios(c);
  else if(page==='clientes')renderClientes(c);
  updateBadges();
}

function updateBadges(){
  const n=DB.pedidos.filter(p=>p.status==='aguardando_aprovacao'||p.status==='aguardando_validacao').length;
  const b=document.getElementById('nav-badge-pedidos');
  if(n>0){b.textContent=n;b.classList.remove('hidden');}else b.classList.add('hidden');
  const bb=document.getElementById('bn-badge');
  if(bb){if(n>0){bb.textContent=n;bb.classList.remove('hidden');}else bb.classList.add('hidden');}
}

// ===================== DASHBOARD =====================
function renderDashboard(c){
  if(currentUser.role!=='master'){navigate('pedidos');return;}
  const fDI=window._dashFDataIni||'';
  const fDF=window._dashFDataFim||'';
  const fCL=window._dashFCliente||'';
  let peds=DB.pedidos.filter(p=>p.status!=='cancelado');
  if(fCL)peds=peds.filter(p=>p.clienteId===fCL);
  if(fDI){const di=parseDate(fDI);if(di)peds=peds.filter(p=>parseDate(p.dataPedido)>=di);}
  if(fDF){const df=parseDate(fDF);if(df)peds=peds.filter(p=>parseDate(p.dataPedido)<=df);}
  const tot=peds.length;
  const pa=DB.pedidos.filter(p=>p.status==='aguardando_aprovacao').length;
  const pv=DB.pedidos.filter(p=>p.status==='aguardando_validacao').length;
  const pc=peds.filter(p=>p.status==='concluido').length;
  const vt=peds.reduce((a,p)=>a+(p.valorTotal||0),0);
  const tonTotal=peds.reduce((a,p)=>a+(p.itens||[]).reduce((b,it)=>b+(parseFloat(it.qtd)||0),0),0);
  const precoMedTon=tonTotal>0?vt/tonTotal:0;
  const vtMed=tot>0?vt/tot:0;
  const porProduto={};
  peds.forEach(p=>(p.itens||[]).forEach(it=>{
    const k=it.nome;
    if(!porProduto[k])porProduto[k]={qtd:0,valor:0};
    porProduto[k].qtd+=(parseFloat(it.qtd)||0);
    porProduto[k].valor+=(parseFloat(it.qtd)||0)*(parseFloat(it.preco)||0);
  }));
  const prodList=Object.entries(porProduto).sort((a,b)=>b[1].valor-a[1].valor);
  const maxProdTon=Math.max(1,...prodList.map(x=>x[1].qtd));
  const maxProdVal=Math.max(1,...prodList.map(x=>x[1].valor));
  const porCliente={};
  peds.forEach(p=>{
    if(!porCliente[p.clienteId])porCliente[p.clienteId]={nome:p.clienteNome,valor:0,qtd:0,count:0};
    porCliente[p.clienteId].valor+=(p.valorTotal||0);
    porCliente[p.clienteId].qtd+=(p.itens||[]).reduce((b,it)=>b+(parseFloat(it.qtd)||0),0);
    porCliente[p.clienteId].count++;
  });
  const clList=Object.values(porCliente).sort((a,b)=>b.valor-a.valor);
  const maxClVal=Math.max(1,...clList.map(x=>x.valor));

  function barTon(nome,d,max){
    const pct=Math.max(2,Math.round((d.qtd/max)*100));
    const ns=nome.length>38?nome.substring(0,38)+'…':nome;
    return `<div class="chart-bar-item"><div class="chart-bar-label" title="${nome}">${ns}</div><div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${pct}%">${pct>20?'<span class="chart-bar-val">'+d.qtd.toFixed(1)+' t</span>':''}</div></div>${pct<=20?'<span class="chart-bar-val-out">'+d.qtd.toFixed(1)+' t</span>':''}</div>`;
  }
  function barVal(nome,val,max,cor){
    const pct=Math.max(2,Math.round((val/max)*100));
    const ns=nome.length>38?nome.substring(0,38)+'…':nome;
    const vm=fmtMoney(val);
    return `<div class="chart-bar-item"><div class="chart-bar-label" title="${nome}">${ns}</div><div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${pct}%;background:${cor}">${pct>25?'<span class="chart-bar-val">'+vm+'</span>':''}</div></div>${pct<=25?'<span class="chart-bar-val-out">'+vm+'</span>':''}</div>`;
  }

  c.innerHTML=`
  ${DB.pedidos.length<4?'<div style="margin-bottom:.8rem"><div class="alert alert-info" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem"><span>📥 Importar pedidos históricos PV-001 a 004?</span><button class="btn btn-primary btn-sm" onclick="seedPedidosHistoricos()">Importar agora</button></div></div>':''}
  <div class="filtros-bar" style="margin-bottom:1rem">
    <div class="fg"><label>Data inicial</label><input type="date" id="dash-di" value="${fDI}" onchange="window._dashFDataIni=this.value;renderDashboard(document.getElementById('main-content'))"></div>
    <div class="fg"><label>Data final</label><input type="date" id="dash-df" value="${fDF}" onchange="window._dashFDataFim=this.value;renderDashboard(document.getElementById('main-content'))"></div>
    <div class="fg" style="min-width:200px"><label>Cliente</label>
      <select id="dash-cl" onchange="window._dashFCliente=this.value;renderDashboard(document.getElementById('main-content'))">
        <option value="">Todos os clientes</option>
        ${DB.clientes.map(cl=>`<option value="${cl.id}" ${fCL===cl.id?'selected':''}>${cl.codigo||'?'} — ${cl.razaoSocial}</option>`).join('')}
      </select>
    </div>
    <div class="fg" style="display:flex;align-items:flex-end"><button class="btn btn-secondary btn-sm" onclick="window._dashFDataIni='';window._dashFDataFim='';window._dashFCliente='';renderDashboard(document.getElementById('main-content'))">Limpar</button></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Pedidos</div><div class="stat-value">${tot}</div></div>
    <div class="stat-card"><div class="stat-label">Aguard. Aprovação</div><div class="stat-value" style="color:var(--amber)">${pa}</div></div>
    <div class="stat-card"><div class="stat-label">Aguard. Validação</div><div class="stat-value" style="color:var(--blue)">${pv}</div></div>
    <div class="stat-card"><div class="stat-label">Concluídos</div><div class="stat-value">${pc}</div></div>
  </div>
  <div class="analytics-grid">
    <div class="ana-card"><div class="ana-label">Valor Total</div><div class="ana-value" style="font-size:1rem">${fmtMoney(vt)}</div><div class="ana-sub">no período filtrado</div></div>
    <div class="ana-card"><div class="ana-label">Total Toneladas</div><div class="ana-value">${tonTotal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})} t</div><div class="ana-sub">volume comercializado</div></div>
    <div class="ana-card"><div class="ana-label">Preço Médio / Ton</div><div class="ana-value" style="font-size:1rem">${fmtMoney(precoMedTon)}</div><div class="ana-sub">média ponderada</div></div>
    <div class="ana-card"><div class="ana-label">Ticket Médio</div><div class="ana-value" style="font-size:1rem">${fmtMoney(vtMed)}</div><div class="ana-sub">por pedido</div></div>
    <div class="ana-card"><div class="ana-label">Clientes Ativos</div><div class="ana-value">${clList.length}</div><div class="ana-sub">no período</div></div>
    <div class="ana-card"><div class="ana-label">Total Cadastral</div><div class="ana-value">${DB.pedidos.length}</div><div class="ana-sub">todos os pedidos</div></div>
  </div>
  ${renderGraficoProdutos(prodList,maxProdTon,maxProdVal)}
  ${renderGraficoClientes(clList,maxClVal)}
  ${renderRankingVendedores(peds)}
  ${renderPainelResultados(peds)}
  <div class="card"><div class="card-title">Pedidos Recentes</div>
    ${DB.pedidos.slice(-5).reverse().map(p=>`
    <div class="pedido-row" onclick="openPedido('${p.id}')" style="grid-template-columns:80px 1fr 155px 115px">
      <span class="pedido-num">PV-${String(p.numero).padStart(3,'0')}</span>
      <span class="pedido-cliente">${p.clienteNome}</span>
      <span class="status-badge s-${p.status}">${statusLabel(p.status)}</span>
      <span class="pedido-valor">${fmtMoney(p.valorTotal)}</span>
    </div>`).join('')||'<p style="color:var(--text-sec);font-size:.85rem;padding:.5rem 0">Nenhum pedido ainda.</p>'}
  </div>`;
}

// ===================== RANKING VENDEDORES =====================
function renderGraficoProdutos(prodList, maxTon, maxVal){
  if(!prodList.length) return '';
  const cores=['#1A5E2A','#185FA5','#BA7517','#5B3A8C','#A32D2D'];
  const totalTon=prodList.reduce((a,[,d])=>a+d.qtd,0);
  const totalVal=prodList.reduce((a,[,d])=>a+d.valor,0);

  // Barras lado a lado para cada produto
  const barras=prodList.map(([nome,d],i)=>{
    const cor=cores[i%cores.length];
    const pctT=Math.max(3,Math.round(d.qtd/Math.max(1,maxTon)*100));
    const pctV=Math.max(3,Math.round(d.valor/Math.max(1,maxVal)*100));
    const ns=nome.replace(/\s*[–-]\s*Big Bag.*|Sacaria.*/,'').replace('Ureia ','').trim();
    const porcTon=totalTon>0?(d.qtd/totalTon*100).toFixed(1):'0';
    const porcVal=totalVal>0?(d.valor/totalVal*100).toFixed(1):'0';
    return `<div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:.8rem 1rem;flex:1;min-width:160px">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.7rem">
        <div style="width:10px;height:10px;border-radius:2px;background:${cor};flex-shrink:0"></div>
        <div style="font-weight:700;font-size:.8rem;line-height:1.3">${ns}</div>
      </div>
      <div style="margin-bottom:.6rem">
        <div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--text-sec);margin-bottom:.2rem">
          <span>Volume</span><span style="font-weight:700;color:${cor}">${d.qtd.toFixed(1)} t <span style="opacity:.6">(${porcTon}%)</span></span>
        </div>
        <div style="background:var(--gray-light);border-radius:3px;height:10px">
          <div style="width:${pctT}%;height:100%;background:${cor};border-radius:3px"></div>
        </div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--text-sec);margin-bottom:.2rem">
          <span>Valor</span><span style="font-weight:700;color:${cor}">${fmtMoney(d.valor)} <span style="opacity:.6">(${porcVal}%)</span></span>
        </div>
        <div style="background:var(--gray-light);border-radius:3px;height:10px">
          <div style="width:${pctV}%;height:100%;background:${cor};opacity:.55;border-radius:3px"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="card-title">📦 Produtos Comercializados</div>
    <div style="display:flex;gap:.7rem;flex-wrap:wrap">${barras}</div>
    <div style="display:flex;justify-content:flex-end;gap:1.5rem;margin-top:.8rem;padding-top:.6rem;border-top:1px solid var(--border)">
      <span style="font-size:.75rem;color:var(--text-sec)">Total: <b style="color:var(--text)">${totalTon.toFixed(1)} ton · ${fmtMoney(totalVal)}</b></span>
    </div>
  </div>`;
}

function renderGraficoClientes(clList, maxVal){
  if(!clList.length) return '';
  const totalVal=clList.reduce((a,c)=>a+c.valor,0);
  const cores=['#BA7517','#1A5E2A','#185FA5','#5B3A8C','#A32D2D','#2E7D6B'];
  // Top 5
  const top=clList.slice(0,6);

  const linhas=top.map((c,i)=>{
    const cor=cores[i%cores.length];
    const pct=Math.max(3,Math.round(c.valor/Math.max(1,maxVal)*100));
    const porc=totalVal>0?(c.valor/totalVal*100).toFixed(1):'0';
    const ns=c.nome.length>28?c.nome.substring(0,28)+'…':c.nome;
    return `<div style="display:grid;align-items:center;gap:.6rem;grid-template-columns:auto 1fr auto;margin-bottom:.55rem">
      <div style="width:8px;height:8px;border-radius:50%;background:${cor};flex-shrink:0"></div>
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem">
          <span style="font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px" title="${c.nome}">${ns}</span>
          <span style="font-size:.72rem;color:${cor};font-weight:700;margin-left:.5rem;white-space:nowrap">${fmtMoney(c.valor)}</span>
        </div>
        <div style="background:var(--gray-light);border-radius:3px;height:8px">
          <div style="width:${pct}%;height:100%;background:${cor};border-radius:3px"></div>
        </div>
      </div>
      <div style="font-size:.68rem;color:var(--text-sec);white-space:nowrap;text-align:right">${porc}%</div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="card-title">🏢 Ranking de Clientes</div>
    ${linhas}
    ${clList.length>6?`<div style="font-size:.73rem;color:var(--text-sec);margin-top:.4rem">+${clList.length-6} outros</div>`:''}
    <div style="border-top:1px solid var(--border);margin-top:.7rem;padding-top:.6rem;display:flex;justify-content:flex-end">
      <span style="font-size:.75rem;color:var(--text-sec)">Total: <b style="color:var(--text)">${fmtMoney(totalVal)}</b></span>
    </div>
  </div>`;
}

function renderPainelResultados(peds){
  const statusAtivos=['aguardando_aprovacao','aguardando_assinatura','aguardando_validacao','aprovado_embarque','aguardando_pagamento'];
  const emAndamento=peds.filter(p=>statusAtivos.includes(p.status)&&(p.custoPorTon>0||p.comissaoPorTon>0));
  const concluidos=peds.filter(p=>p.status==='concluido'&&(p.custoPorTon>0||p.comissaoPorTon>0));
  if(!emAndamento.length&&!concluidos.length) return '';

  function calcTotais(lista){
    const receita=lista.reduce((a,p)=>a+(p.valorTotal||0),0);
    const ton=lista.reduce((a,p)=>a+(p.itens||[]).reduce((b,it)=>b+(parseFloat(it.qtd)||0),0),0);
    const custo=lista.reduce((a,p)=>a+(parseFloat(p.custoPorTon||0))*(p.itens||[]).reduce((b,it)=>b+(parseFloat(it.qtd)||0),0),0);
    const com=lista.reduce((a,p)=>a+(parseFloat(p.comissaoPorTon||0))*(p.itens||[]).reduce((b,it)=>b+(parseFloat(it.qtd)||0),0),0);
    const margem=receita-custo-com;
    const pct=receita>0?(margem/receita*100).toFixed(1):0;
    return{receita,ton,custo,com,margem,pct};
  }

  function bloco(titulo,lista,cor,icone){
    if(!lista.length) return '';
    const t=calcTotais(lista);
    return `<div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem">
      <div style="font-size:.78rem;font-weight:700;color:${cor};text-transform:uppercase;letter-spacing:.5px;margin-bottom:.75rem">${icone} ${titulo} <span style="font-weight:400;opacity:.7">(${lista.length} pedido${lista.length!==1?'s':''})</span></div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem">
        <div style="border:1px solid var(--border);border-radius:var(--radius);padding:.55rem .7rem">
          <div style="font-size:.63rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.4px">Receita</div>
          <div style="font-weight:700;color:var(--blue);font-size:.88rem;font-family:'DM Mono',monospace">${fmtMoney(t.receita)}</div>
          <div style="font-size:.68rem;color:var(--text-sec)">${t.ton.toFixed(1)} ton · ${t.receita>0&&t.ton>0?fmtMoney(t.receita/t.ton)+'/ton':''}</div>
        </div>
        <div style="border:1px solid var(--border);border-radius:var(--radius);padding:.55rem .7rem">
          <div style="font-size:.63rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.4px">Custo Total</div>
          <div style="font-weight:700;color:var(--red);font-size:.88rem;font-family:'DM Mono',monospace">${fmtMoney(t.custo)}</div>
          <div style="font-size:.68rem;color:var(--text-sec)">Comissão: ${fmtMoney(t.com)}</div>
        </div>
        <div style="border:1px solid ${t.margem>=0?'var(--green-mid)':'#f5b5b5'};background:${t.margem>=0?'#e8f5e9':'#fcebeb'};border-radius:var(--radius);padding:.55rem .7rem;grid-column:1/-1">
          <div style="font-size:.63rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.4px">Margem Líquida</div>
          <div style="font-weight:700;color:${t.margem>=0?'var(--green)':'var(--red)'};font-size:1rem;font-family:'DM Mono',monospace">${fmtMoney(t.margem)} <span style="font-size:.75rem;font-weight:600">(${t.pct}%)</span></div>
        </div>
      </div>
    </div>`;
  }

  return `<div class="card">
    <div class="card-title">📈 Painel de Resultados</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.8rem">
      ${bloco('Resultados a Confirmar',emAndamento,'var(--amber)','🔮')}
      ${bloco('Resultado Efetivo',concluidos,'var(--green)','✅')}

    </div>`:''}

}

function renderRankingVendedores(peds){
  if(!peds.length) return '';
  const rv={};
  peds.forEach(p=>{
    const k=p.vendedorId||'sem_vendedor';
    if(!rv[k]) rv[k]={nome:p.vendedorNome||'Sem vendedor',valor:0,qtd:0,peds:0,conc:0};
    rv[k].valor += (p.valorTotal||0);
    rv[k].qtd   += (p.itens||[]).reduce((a,it)=>a+(parseFloat(it.qtd)||0),0);
    rv[k].peds  += 1;
    if(p.status==='concluido') rv[k].conc++;
  });
  const lista=Object.values(rv).sort((a,b)=>b.valor-a.valor);
  if(!lista.length) return '';
  const maxVal=Math.max(1,...lista.map(v=>v.valor));
  const maxQtd=Math.max(1,...lista.map(v=>v.qtd));
  const cores=['#1A5E2A','#BA7517','#185FA5','#A32D2D','#5B3A8C'];

  const cards=lista.map((v,i)=>{
    const pctVal=Math.max(3,Math.round(v.valor/maxVal*100));
    const pctQtd=Math.max(3,Math.round(v.qtd/maxQtd*100));
    const cor=cores[i%cores.length];
    const ini=v.nome.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const nm=v.nome.split(' ').slice(0,2).join(' ');
    return `<div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;display:flex;flex-direction:column;gap:.7rem">
      <div style="display:flex;align-items:center;gap:.7rem">
        <div style="width:38px;height:38px;border-radius:50%;background:${cor};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0">${ini}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${v.nome}">${nm}</div>
          <div style="font-size:.72rem;color:var(--text-sec)">${v.peds} pedido${v.peds!==1?'s':''} · ${v.conc} concluído${v.conc!==1?'s':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:700;font-size:.92rem;color:${cor};font-family:'DM Mono',monospace">${fmtMoney(v.valor)}</div>
          <div style="font-size:.7rem;color:var(--text-sec)">${v.qtd.toFixed(1)} ton</div>
        </div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--text-sec);margin-bottom:.25rem"><span>Valor</span><span>${fmtMoney(v.valor)}</span></div>
        <div style="background:var(--gray-light);border-radius:4px;height:8px;overflow:hidden">
          <div style="width:${pctVal}%;height:100%;background:${cor};border-radius:4px;transition:width .4s ease"></div>
        </div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--text-sec);margin-bottom:.25rem"><span>Volume</span><span>${v.qtd.toFixed(1)} ton</span></div>
        <div style="background:var(--gray-light);border-radius:4px;height:8px;overflow:hidden">
          <div style="width:${pctQtd}%;height:100%;background:${cor};opacity:.45;border-radius:4px;transition:width .4s ease"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem">
        <div style="background:var(--gray-light);border-radius:var(--radius);padding:.4rem .6rem;text-align:center">
          <div style="font-size:.65rem;color:var(--text-sec)">Ticket Médio</div>
          <div style="font-size:.8rem;font-weight:700;color:var(--text)">${v.peds>0?fmtMoney(v.valor/v.peds):'-'}</div>
        </div>
        <div style="background:var(--gray-light);border-radius:var(--radius);padding:.4rem .6rem;text-align:center">
          <div style="font-size:.65rem;color:var(--text-sec)">Taxa Conclusão</div>
          <div style="font-size:.8rem;font-weight:700;color:var(--green)">${v.peds>0?Math.round(v.conc/v.peds*100)+'%':'-'}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="card-title">🏆 Ranking de Vendedores</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.8rem">${cards}</div>
  </div>`;
}

function fmtClienteInfoDetalhado(cl){

  return`<div style="display:flex;align-items:center;gap:.6rem">

function buscarClientePorCodigo(val){
  val=val.trim();
  const sugest=document.getElementById('np-sugestoes');
  if(sugest)sugest.innerHTML='';
  if(!val){npData.clienteId='';document.getElementById('np-cliente-info').style.display='none';return;}
  const cl=DB.clientes.find(c=>c.codigo===val.padStart(5,'0')||c.codigo===val);
  if(cl){preencherCliente(cl.id);}
  else{
    // Não encontrou exato ainda — mostra sugestões parciais
    const parciais=DB.clientes.filter(c=>(c.codigo||'').startsWith(val));
    renderSugestoes(parciais);
    if(!parciais.length){
      document.getElementById('np-cliente-info').style.display='none';
      npData.clienteId='';
    }
  }

async function salvarPedido(editId){
  const clienteId=document.getElementById('np-cliente').value;
  if(!clienteId){toast('Selecione um cliente.','err');return;}
  const cliente=DB.clientes.find(c=>c.id===clienteId);
  const itensOk=npData.itens.filter(i=>i.itemId&&i.qtd&&i.preco);
  if(itensOk.length===0){toast('Adicione pelo menos um item válido.','err');return;}
  const valorTotal=itensOk.reduce((a,it)=>a+(parseFloat(it.qtd)||0)*(parseFloat(it.preco)||0),0);
  const frete=document.getElementById('np-frete').value,pgto=document.getElementById('np-pgto').value,
    coleta=document.getElementById('np-coleta').value,local=document.getElementById('np-local').value,
    validade=document.getElementById('np-validade').value,obs=document.getElementById('np-obs').value;
  if(editId){
    const idx=DB.pedidos.findIndex(p=>p.id===editId);
    Object.assign(DB.pedidos[idx],{clienteId,clienteNome:cliente.razaoSocial,itens:itensOk,valorTotal,frete,formaPgto:pgto,dataColeta:coleta,localColeta:local,validade,obs,status:'aguardando_aprovacao'});
    addHistorico(editId,'aguardando_aprovacao','Pedido editado e reenviado.',currentUser.nome);
  }else{
    const numero=nextNumero();
    const ped={id:uid(),numero,clienteId,clienteNome:cliente.razaoSocial,itens:itensOk,valorTotal,frete,formaPgto:pgto,dataColeta:coleta,localColeta:local,validade,obs,status:'aguardando_aprovacao',vendedorId:currentUser.id,vendedorNome:currentUser.nome,dataPedido:dateStr(),historico:[],arquivos:[],nfNumero:'',loteNumero:'',laudoDesc:''};
    addHistoricoObj(ped,'aguardando_aprovacao','Pedido criado.',currentUser.nome);
    DB.pedidos.push(ped);
  }
  await saveDB();toast('Pedido enviado para aprovação!','ok');navigate('pedidos');
}
function nextNumero(){const nums=DB.pedidos.map(p=>parseInt(p.numero)||0).filter(n=>n>0);const max=nums.length>0?Math.max(...nums):0;return String(max+1).padStart(3,'0');}

// ===================== VER PEDIDO =====================
function openPedido(id){
  const p=DB.pedidos.find(x=>x.id===id); if(!p) return;
  const isMaster=currentUser.role==='master';

function confirmarAcaoMaster(acao,pedidoId,callback){
  document.getElementById('master-confirm-overlay')?.remove();
  const overlay=document.createElement('div');
  overlay.id='master-confirm-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:2000;padding:1rem';
  overlay.innerHTML=`
    <div style="background:#fff;border-radius:12px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)">
      <div style="padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <h3 style="font-size:.95rem;font-weight:700">${acao==='cancelar'?'⚠️ Cancelar Pedido':'🔐 Confirmação Master'}</h3>
        <button onclick="document.getElementById('master-confirm-overlay').remove()" style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--text-sec)">✕</button>
      </div>
      <div style="padding:1.3rem 1.5rem">
        <div class="alert alert-warning" style="margin-bottom:1rem">${acao==='cancelar'?'Esta ação exige autenticação. Informe sua senha e o motivo do cancelamento.':'Você está editando um pedido em status avançado. Confirme sua senha master.'}</div>
        <div class="form-group"><label>Senha master</label><input type="password" id="mc-senha" placeholder="Sua senha"></div>
        ${acao==='cancelar'?'<div class="form-group"><label>Motivo *</label><textarea id="mc-motivo" style="min-height:70px" placeholder="Descreva o motivo..."></textarea></div>':''}
        <div id="mc-err" style="color:var(--red);font-size:.82rem;margin-top:.3rem;display:none"></div>
      </div>
      <div style="padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="document.getElementById('master-confirm-overlay').remove()">Cancelar</button>
        <button class="btn btn-danger" onclick="executarAcaoMaster('${acao}','${pedidoId||''}')">${acao==='cancelar'?'Confirmar Cancelamento':'Confirmar Edição'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  if(callback)window._masterCb=callback;
  setTimeout(()=>document.getElementById('mc-senha')?.focus(),80);
}

async function executarAcaoMaster(acao,pedidoId){
  const senha=document.getElementById('mc-senha')?.value||'';
  const motivo=document.getElementById('mc-motivo')?.value?.trim()||'';
  const err=document.getElementById('mc-err');
  if(currentUser.senha!==btoa(senha)){err.textContent='Senha incorreta.';err.style.display='block';return;}
  if(acao==='cancelar'&&!motivo){err.textContent='Informe o motivo.';err.style.display='block';return;}
  document.getElementById('master-confirm-overlay')?.remove();
  if(acao==='cancelar'){
    const idx=DB.pedidos.findIndex(p=>p.id===pedidoId);
    DB.pedidos[idx].status='cancelado';
    addHistorico(pedidoId,'cancelado','[MASTER] '+motivo,currentUser.nome);
    await saveDB();closeModal('modal-pedido');toast('Pedido cancelado.','ok');navigate('pedidos');
  } else if(acao==='editar'){
    if(window._masterCb){window._masterCb();window._masterCb=null;}
  }
}

async function concluirPedido(id){
  const nff=document.getElementById('emb-nff')?.value?.trim();
  const nfv=document.getElementById('emb-nfv')?.value?.trim();
  const lote=document.getElementById('emb-lote')?.value?.trim();
  const p=DB.pedidos.find(x=>x.id===id);
  const erros=[];
  if(!nff)erros.push('Nº NF Fornecedor');
  if(!nfv)erros.push('Nº NF Venda');
  if(!lote)erros.push('Nº do Lote');
  if(!p.arquivos?.find(a=>a.tipo==='nf_fornecedor'))erros.push('Arquivo NF Fornecedor');
  if(!p.arquivos?.find(a=>a.tipo==='nf_venda'))erros.push('Arquivo NF Venda');
  if(!p.arquivos?.find(a=>a.tipo==='laudo'))erros.push('Arquivo Laudo');
  if(erros.length){toast('Faltando: '+erros.join(', '),'err');return;}
  const idx=DB.pedidos.findIndex(x=>x.id===id);
  DB.pedidos[idx].nfFornecedor=nff;
  DB.pedidos[idx].nfVenda=nfv;
  DB.pedidos[idx].loteNumero=lote;
  DB.pedidos[idx].status='concluido';
  addHistorico(id,'concluido',`NF Forn: ${nff} | NF Venda: ${nfv} | Lote: ${lote}`,currentUser.nome);
  await saveDB();closeModal('modal-pedido');toast('Pedido concluído! 🎉','ok');navigate('pedidos');
}

async function uploadArquivo(pedId,tipo,input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const maxMB=5;
  if(file.size>maxMB*1024*1024){toast(`Arquivo muito grande. Máximo ${maxMB}MB.`,'err');return;}
  toast('Lendo arquivo... ⏳','ok');
  try{
    // Ler como base64
    const b64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result);
      r.onerror=rej;
      r.readAsDataURL(file);
    });
    // Salvar no localStorage primeiro (acesso rápido local)
    const idx=DB.pedidos.findIndex(p=>p.id===pedId);
    if(!DB.pedidos[idx].arquivos)DB.pedidos[idx].arquivos=[];
    DB.pedidos[idx].arquivos=DB.pedidos[idx].arquivos.filter(a=>a.tipo!==tipo);
    const arqObj={tipo,nome:file.name,mime:file.type,data:dateStr(),b64};
    DB.pedidos[idx].arquivos.push(arqObj);
    if(tipo==='assinado'){
      DB.pedidos[idx].status='validar_assinatura';
      addHistorico(pedId,'validar_assinatura',`PDF assinado anexado: ${file.name}`,currentUser.nome);
    } else {
      addHistorico(pedId,DB.pedidos[idx].status,`Arquivo anexado (${labelTipo(tipo)}): ${file.name}`,currentUser.nome);
    }
    // Salvar dados do pedido (sem b64 para não estourar Firestore principal)
    await saveDB();
    toast('Salvando na nuvem... ☁️','ok');
    // Salvar b64 em documento separado no Firestore
    await salvarArquivoNuvem(pedId, tipo, b64, file.name, file.type);
    toast('Arquivo enviado! ✓','ok');
    openPedido(pedId);
  }catch(e){
    console.error('Upload error:',e);
    toast('Erro ao enviar: '+e.message,'err');
  }
}

// Salva arquivo na nuvem dividindo em chunks de 700KB (limite Firestore ~1MB/doc)
const CHUNK_SIZE = 700000; // ~700KB por chunk
const FS_ARQ_BASE = `https://firestore.googleapis.com/v1/projects/madrigal---gestao-de-pedidos/databases/(default)/documents/arquivos`;

async function salvarArquivoNuvem(pedId, tipo, b64, nome, mime){
  const docId=`${pedId}_${tipo}`;
  const chunks=[];
  for(let i=0;i<b64.length;i+=CHUNK_SIZE) chunks.push(b64.slice(i,i+CHUNK_SIZE));
  try{
    // Salva metadados + total de chunks
    const metaUrl=`${FS_ARQ_BASE}/${docId}_meta?key=${FS_KEY}`;
    await fetch(metaUrl,{method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fields:{
        pedId:{stringValue:pedId},tipo:{stringValue:tipo},
        nome:{stringValue:nome},mime:{stringValue:mime||''},
        data:{stringValue:dateStr()},chunks:{integerValue:chunks.length}
      }})
    });
    // Salva cada chunk
    for(let i=0;i<chunks.length;i++){
      const chunkUrl=`${FS_ARQ_BASE}/${docId}_chunk${i}?key=${FS_KEY}`;
      await fetch(chunkUrl,{method:'PATCH',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fields:{data:{stringValue:chunks[i]}}})
      });
    }
  }catch(e){
    console.warn('Falha ao salvar arquivo na nuvem:',e.message);
  }
}

// Carrega arquivo da nuvem remontando chunks
async function carregarArquivoNuvem(pedId, tipo){
  const docId=`${pedId}_${tipo}`;
  try{
    // Busca metadados
    const metaUrl=`${FS_ARQ_BASE}/${docId}_meta?key=${FS_KEY}`;
    const metaR=await fetch(metaUrl);
    if(!metaR.ok) return null;
    const meta=await metaR.json();
    const totalChunks=parseInt(meta.fields?.chunks?.integerValue||1);
    // Busca todos os chunks em paralelo
    const promises=[];
    for(let i=0;i<totalChunks;i++){
      const url=`${FS_ARQ_BASE}/${docId}_chunk${i}?key=${FS_KEY}`;
      promises.push(fetch(url).then(r=>r.ok?r.json():null));
    }
    const docs=await Promise.all(promises);
    const parts=docs.map(d=>d?.fields?.data?.stringValue||'');
    return parts.join('') || null;
  }catch(e){
    return null;
  }
}

function labelTipo(tipo){
  const m={assinado:'Pedido Assinado',nf_fornecedor:'NF Fornecedor',nf_venda:'NF Venda',laudo:'Laudo',comprovante:'Comprovante'};
  return m[tipo]||tipo;
}


function renderArquivos(p){
  const arqs=p.arquivos||[];
  if(!arqs.length)return'<div style="font-size:.82rem;color:var(--text-sec);padding:.3rem 0">Nenhum arquivo anexado ainda.</div>';
  const labels={assinado:'Pedido Assinado',nf_fornecedor:'NF Fornecedor',nf_venda:'NF Venda',laudo:'Laudo',comprovante:'Comprovante de Pagto'};
  const icons={assinado:'✍️',nf_fornecedor:'🧾',nf_venda:'🧾',laudo:'📄',comprovante:'💰'};
  return '<div style="display:flex;flex-direction:column;gap:.35rem">'+arqs.map(a=>`
    <div class="file-item" style="gap:.6rem;align-items:center">
      <span style="font-size:1rem;flex-shrink:0">${icons[a.tipo]||'📎'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:.8rem">${labels[a.tipo]||a.tipo}</div>
        <div style="font-size:.72rem;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.nome}</div>
      </div>
      <span style="font-size:.68rem;color:var(--text-sec);flex-shrink:0">${a.data}</span>
      <div style="display:flex;gap:.3rem;flex-shrink:0;align-items:center">
        <button class="btn btn-secondary btn-sm" style="padding:.2rem .55rem;font-size:.75rem" onclick="visualizarArquivo('${p.id}','${a.tipo}')">👁 Ver</button>
        <button class="btn btn-secondary btn-sm" style="padding:.2rem .55rem;font-size:.75rem" onclick="downloadArquivoLocal('${p.id}','${a.tipo}')">⬇ Baixar</button>
        ${!a.b64?'<span title="Arquivo salvo na nuvem" style="font-size:.75rem;color:var(--amber)">☁️</span>':'<span title="Arquivo disponível localmente" style="font-size:.75rem;color:var(--green)">✓</span>'}
      </div>
    </div>`).join('')+'</div>';
}
